name: Update Social Stats

on:
  schedule:
    # Runs daily at 6:00 UTC (2 PM SGT), accounting for GitHub's ~4hr delay to land around 6 PM SGT
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Scrape social stats
        run: bun scripts/scrape-social-stats.ts
        env:
          YOUTUBE_HANDLE: jiaweihq
          TWITCH_HANDLE: jiaweihq
          TIKTOK_HANDLE: jiaweihq
          INSTAGRAM_HANDLE: jiaweihq
          THREADS_HANDLE: jiaweihq
          X_HANDLE: jiaweihq

      - name: Commit updated stats
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/social-growth.ts
          git diff --staged --quiet || git commit --no-verify -m "chore: update social stats [skip ci]"
          git push
